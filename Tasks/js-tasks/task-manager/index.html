<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task manager</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <!-- NAVBAR  -->
      <div class="nav">
        <div class="part1">
          <h1>Welcome , <span>Developer! 👋</span></h1>
        </div>
        <div class="part2">
          []
          <div class="create">
            <button class="create-btn">Create Task</button>
          </div>
        </div>
      </div>

      <!-- ADD TO TASK -->
      <div class="container">
        <form class="create-task">
          <div class="close">X</div>
          <h4>Create New Task</h4>
          <div class="task-title">
            <p>Task Title</p>
            <input type="text" placeholder="e.g learn dom" />
          </div>
          <div class="category">
            <p>Category</p>
            <select>
              <option value="Study">🟢Study</option>
              <option value="Work">🟣Work</option>
              <option value="Personal">⚫Personal</option>
            </select>
          </div>
          <button>Add task</button>
        </form>
      </div>

      <!-- TASK OVERVIEW AND SEARCH FILTER -->
      <div class="task-overview">
        <div class="status">
          <div class="total count-box">
            <i class="ri-todo-fill"></i>
            <p>Total : <span>6</span></p>
          </div>
          <div class="completed count-box">
            <i class="ri-checkbox-circle-line"></i>

            <p>Completed : <span>3</span></p>
          </div>
          <div class="pending count-box">
            <i class="ri-time-line"></i>
            <p>Pending : <span>3</span></p>
          </div>
        </div>
        <div class="filtering">
          <input type="text" placeholder="🔍 Search Tasks" />
          <div>
            <select>
              <option value="All Categories">All Categories</option>
              <option value="Study">🟢Study</option>
              <option value="Work">🟣Work</option>
              <option value="Personal">⚫Personal</option>
            </select>
          </div>
        </div>
      </div>

      <!-- TASKS -->

      <div class="task-con">
        <p>
          <span><i class="ri-calendar-todo-fill"></i></span>Your Tasks
        </p>
        <div class="tasks"></div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
