<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>register</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="./css/register.css" />

  </head>
  <body>
    <main class="h-screen w-full bg-[#F4F7F6] flex items-center justify-center relative">
      <form class="w-[300px] sm:w-[400px] h-[400px] rounded-lg shadow-lg pt-12 pl-6 pr-6 bg-white">
        <h2 class="text-2xl text-center font-semibold mb-4 text-[#020202] ">Create Account</h2>
        <p class=" text-sm sm:text-md text-center">Join FinTrack Pro</p>
        <div class="inputs flex flex-col gap-4 mt-4">
          <div class="username">
            <p class="text-[16px]">Enter Username</p>
            <input required class="p-1.5 w-full border rounded-md border-gray-300" type="text"  />
          </div>
          <div class="password">
            <p class="text-[16px]">Enter Password</p>
            <input required class="p-1.5 w-full border rounded-md border-gray-300" type="password" />
          </div>
        </div>
        <button class="p-1.5 bg-green-500 w-full mt-4 rounded-md text-[15px] font-medium text-white cursor-pointer hover:bg-green-600 transition ">Register</button>
        <p class="text-center text-[13px] sm:text-[14px] mt-2">Already have an account? <span id="login" class="text-blue-600 cursor-pointer">Login here</span></p>
      </form>
    </main>
    <script src="./js/register.js"></script>
  </body>
</html>
