<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <main
      class="h-[100%] w-[100%] flex items-center justify-center bg-[#78C2F2]"
    >
      <!--  MAIN CONTAINER -->
      <div
        class="container h-[65%] sm:h-[80%] w-[80%] sm:w-[35%] rounded-xl bg-[#FFFFFF]"
      >
        <!-- NAV SECTION -->
        <div
          class="nav h-[100px] w-full flex items-center justify-center gap-2"
        >
          <div class="nav-part1 text-[20px] sm:text-[32px] font-bold">
            TODO List
          </div>
          <div class="nav-part2">
            <img
              class="h-[35px] sm:h-[55px]"
              src="./assets/notebook.gif"
              alt="gif"
            />
          </div>
        </div>

        <!-- ADD TODO SECTION -->
        <div
          class="add-todo h-60px md:h-[80px] flex items-center justify-center w-full"
        >
          <div
            class="search flex items-center justify-between h-[60%] sm:h-[80%] w-[90%] rounded-full bg-[#ECEEF0]"
          >
            <input
              class="p-2 h-full w-[80%] outline-0 ml-2 placeholder:text-[#717574] placeholder:font-normal text-[17px] sm:text-[20px] font-medium placeholder:text-[15px] sm:placeholder:text-[20px]"
              type="text"
              placeholder="Add your items"
            />
            <div
              class="add h-[45px] sm:h-[100%] cursor-pointer w-[19%] sm:w-[13%] rounded-full flex items-center hover:bg-green-500 transition duration-200 justify-center bg-green-400"
            >
              <img
                class=" add-img h-[22px] sm:h-[30px]"
                src="./assets/plus.png"
                alt="add"
              />
            </div>
          </div>
        </div>

        <!-- TODO MESSAGE -->

        <p
          class=" notification-msg text-center   h-[40px] font-medium text-[13px] sm:text-[15px] mt-2 "
        >
          <!-- Todo item Created Successfully! -->
        </p>

        <!-- TODO LISTS -->

        <div
          class="list-container flex flex-nowrap items-center flex-col gap-3 h-[55%] sm:h-[58%] w-[100%] overflow-y-scroll"
        >
          <!-- <div class="todo-list">
            <div class="todo">
              <li>task 1</li>
              <img
                class="h-[15px] hidden sm:h-[20px]"
                src="./assets/check-mark.png"
                alt=""
              />
            </div>
            <div class="edit-del">
              <img class="edit" src="./assets/pencil.png" alt="" />
              <img class="delete" src="./assets/delete.png" alt="" />
            </div>
          </div> -->

          <div class="emptystate"> 
            <p class="text-center font-semibold text-[20px] sm:text-[30px] text-[#43D9D2]">No Items in todo !</p>
            <img class="no-itemsgif" width="400px" src="./assets/noitems.gif"/>
          </div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
